name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.action != 'closed'

    env:
      VITE_ENDPOINT: https://foodtoday-pr-${{ github.event.pull_request.number }}.fly.dev
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      PR_APP_NAME: foodtoday-pr-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}/backend:pr-${{ github.event.pull_request.number }} \
            ./backend
          docker push ghcr.io/${{ github.repository }}/backend:pr-${{ github.event.pull_request.number }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg VITE_ENDPOINT=${{ env.VITE_ENDPOINT }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ env.VITE_GOOGLE_CLIENT_ID }} \
            -t ghcr.io/${{ github.repository }}/frontend:pr-${{ github.event.pull_request.number }} \
            ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:pr-${{ github.event.pull_request.number }}

      - name: Create or update Fly preview app
        run: |
          if ! flyctl apps list | grep -q "$PR_APP_NAME"; then
            flyctl apps create "$PR_APP_NAME" --org personal
          fi

      - name: Set Fly secrets for preview app
        run: |
          flyctl secrets set \
            DATABASE_URL="${{ secrets.PREVIEW_DATABASE_URL }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --app "$PR_APP_NAME"

      - name: Deploy backend to Fly preview app
        run: |
          flyctl deploy \
            --app "$PR_APP_NAME" \
            --image ghcr.io/${{ github.repository }}/backend:pr-${{ github.event.pull_request.number }} \
            --strategy immediate \
            --wait-timeout 120

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const appName = `foodtoday-pr-${prNumber}`;
            const url = `https://${appName}.fly.dev`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            );

            const body = `### Preview deployment\n\nBackend: ${url}\n\nUpdated at: ${new Date().toUTCString()}\nCommit: \`${{ github.event.pull_request.head.sha }}\``;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  teardown-preview:
    name: Teardown Preview
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.action == 'closed'

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      PR_APP_NAME: foodtoday-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Delete Fly preview app
        run: |
          if flyctl apps list | grep -q "$PR_APP_NAME"; then
            flyctl apps destroy "$PR_APP_NAME" --yes
          fi

      - name: Comment teardown on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '### Preview deployment\n\nPreview environment has been torn down.',
            });
